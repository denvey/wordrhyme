# ============================================================
# WordRhyme Production — Docker Compose
#
# 两种模式:
#   1. 全量模式 (默认): PG + Redis + App 全部本机跑
#      docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
#   2. 无状态模式: 只跑应用，数据库连外部服务 (RDS/Neon/Supabase)
#      DB_MODE=external docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#      (此模式不启动 postgres/redis 容器)
#
# 镜像来源:
#   - server/admin/web: GitHub Actions 构建 → GHCR
#   - postgres/redis/nginx: 官方镜像
# ============================================================

services:
  # ---- Database (全量模式) ----
  postgres:
    image: postgres:16-alpine
    container_name: wr-postgres
    restart: unless-stopped
    profiles:
      - full        # 只在全量模式启动
      - default     # docker compose up 默认也启动
    environment:
      POSTGRES_USER: ${DB_USER:-wordrhyme}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-wordrhyme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wordrhyme}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wr-internal

  # ---- Cache (全量模式) ----
  redis:
    image: redis:7-alpine
    container_name: wr-redis
    restart: unless-stopped
    profiles:
      - full
      - default
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wr-internal

  # ---- API Server (NestJS + Fastify) ----
  server:
    image: ${SERVER_IMAGE:-ghcr.io/denvey/dsneo/server:latest}
    container_name: wr-server
    restart: unless-stopped
    # 全量模式时等 PG/Redis 就绪；外部数据库模式无依赖
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      RUN_MIGRATE: ${RUN_MIGRATE:-false}
      # 全量模式: 连本机容器；外部模式: 在 .env.production 里写完整外部 URL
      DATABASE_URL: ${DATABASE_URL:-postgresql://${DB_USER:-wordrhyme}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-wordrhyme}}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PLUGIN_DIR: ../../plugins
      PLUGIN_MODE: production
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-admin}
      APP_URL: ${APP_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    networks:
      - wr-internal

  # ---- Admin Panel (React SPA via Nginx) ----
  admin:
    image: ${ADMIN_IMAGE:-ghcr.io/denvey/dsneo/admin:latest}
    container_name: wr-admin
    restart: unless-stopped
    networks:
      - wr-internal

  # ---- Web Frontend (Next.js SSR) ----
  web:
    image: ${WEB_IMAGE:-ghcr.io/denvey/dsneo/web:latest}
    container_name: wr-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - server
    networks:
      - wr-internal

  # ---- Nginx Gateway (Reverse Proxy + SSL) ----
  nginx:
    image: nginx:1.27-alpine
    container_name: wr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_DOMAIN: ${SERVER_DOMAIN:?SERVER_DOMAIN is required}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:?ADMIN_DOMAIN is required}
      WEB_DOMAIN: ${WEB_DOMAIN:?WEB_DOMAIN is required}
    volumes:
      - ./nginx/gateway.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/ssl-params.conf:/etc/nginx/snippets/ssl-params.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - server
      - admin
      - web
    networks:
      - wr-internal

  # ---- Certbot (SSL Auto-Renewal) ----
  certbot:
    image: certbot/certbot:latest
    container_name: wr-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - wr-internal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  wr-internal:
    driver: bridge
