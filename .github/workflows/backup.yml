# ============================================================
# WordRhyme 数据库备份 — 本地 + 云存储 (S3 兼容)
#
# 支持:
#   - 阿里云 OSS
#   - Cloudflare R2
#   - AWS S3
#   - MinIO
#   - 任何 S3 兼容存储
#
# 每天 UTC 3:00 (北京时间 11:00) 自动运行
#
# Required Secrets:
#   SERVER_HOST          — 服务器 IP
#   SERVER_USER          — SSH 用户名
#   SSH_PRIVATE_KEY      — SSH 私钥
#   SERVER_PORT          — SSH 端口
#
# Optional Secrets (开启云存储备份):
#   BACKUP_S3_ENDPOINT   — S3 endpoint (如 https://oss-us-west-1.aliyuncs.com)
#   BACKUP_S3_BUCKET     — 存储桶名
#   BACKUP_S3_ACCESS_KEY — Access Key ID
#   BACKUP_S3_SECRET_KEY — Secret Access Key
#   BACKUP_S3_REGION     — 区域 (默认 us-east-1)
# ============================================================

name: Database Backup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      skip_cloud:
        description: '跳过云存储上传（仅本地备份）'
        type: boolean
        default: false

jobs:
  backup:
    name: 💾 Backup Database
    runs-on: ubuntu-latest

    steps:
      - name: Run backup via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: BACKUP_S3_ENDPOINT,BACKUP_S3_BUCKET,BACKUP_S3_ACCESS_KEY,BACKUP_S3_SECRET_KEY,BACKUP_S3_REGION,SKIP_CLOUD
          script: |
            set -euo pipefail

            BACKUP_DIR="/opt/wordrhyme/backups"
            ENV_FILE="/opt/wordrhyme/infra/.env.production"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="wordrhyme_${TIMESTAMP}.sql.gz"
            BACKUP_PATH="${BACKUP_DIR}/${BACKUP_FILE}"

            mkdir -p "$BACKUP_DIR"

            if [ -f "$ENV_FILE" ]; then
                set -a
                . "$ENV_FILE"
                set +a
            fi

            # ---- 1. 本地备份 ----
            echo "💾 开始数据库备份..."

            docker exec wr-postgres pg_dump -U "${DB_USER:-wordrhyme}" -d "${DB_NAME:-wordrhyme}" \
              --clean --if-exists --no-owner \
              | gzip > "$BACKUP_PATH"

            SIZE=$(du -h "$BACKUP_PATH" | cut -f1)
            echo "✅ 本地备份完成: $BACKUP_PATH ($SIZE)"

            # ---- 2. 上传到云存储 (可选) ----
            SKIP_CLOUD="${{ inputs.skip_cloud }}"
            S3_ENDPOINT="${{ secrets.BACKUP_S3_ENDPOINT }}"
            S3_BUCKET="${{ secrets.BACKUP_S3_BUCKET }}"
            S3_ACCESS_KEY="${{ secrets.BACKUP_S3_ACCESS_KEY }}"
            S3_SECRET_KEY="${{ secrets.BACKUP_S3_SECRET_KEY }}"
            S3_REGION="${{ secrets.BACKUP_S3_REGION || 'us-east-1' }}"

            if [ "$SKIP_CLOUD" != "true" ] && [ -n "$S3_ENDPOINT" ] && [ -n "$S3_BUCKET" ]; then
                echo "☁️  上传到云存储..."

                # 安装 aws-cli (如果没有)
                if ! command -v aws &> /dev/null; then
                    echo "   安装 AWS CLI..."
                    apt-get update -qq && apt-get install -y -qq awscli 2>/dev/null \
                      || pip3 install awscli --quiet 2>/dev/null \
                      || {
                        # Alpine fallback
                        apk add --no-cache aws-cli 2>/dev/null || true
                      }
                fi

                # 配置 AWS CLI (S3 兼容模式)
                export AWS_ACCESS_KEY_ID="$S3_ACCESS_KEY"
                export AWS_SECRET_ACCESS_KEY="$S3_SECRET_KEY"
                export AWS_DEFAULT_REGION="$S3_REGION"

                # 上传
                S3_PATH="s3://${S3_BUCKET}/wordrhyme/db-backups/${BACKUP_FILE}"
                aws s3 cp "$BACKUP_PATH" "$S3_PATH" \
                  --endpoint-url "$S3_ENDPOINT" \
                  --no-progress

                echo "✅ 云存储上传完成: $S3_PATH"

                # 清理云端 60 天前的备份
                echo "🧹 清理云端 60 天前的备份..."
                CUTOFF_DATE=$(date -d '-60 days' +%Y%m%d 2>/dev/null || date -v-60d +%Y%m%d)
                aws s3 ls "s3://${S3_BUCKET}/wordrhyme/db-backups/" \
                  --endpoint-url "$S3_ENDPOINT" 2>/dev/null \
                  | while read -r line; do
                    FILE=$(echo "$line" | awk '{print $NF}')
                    FILE_DATE=$(echo "$FILE" | grep -oP '\d{8}' | head -1)
                    if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" -lt "$CUTOFF_DATE" ] 2>/dev/null; then
                      aws s3 rm "s3://${S3_BUCKET}/wordrhyme/db-backups/${FILE}" \
                        --endpoint-url "$S3_ENDPOINT" --quiet
                      echo "   🗑️ 已删除: $FILE"
                    fi
                  done
            else
                echo "⏭️  跳过云存储上传 (未配置或已禁用)"
            fi

            # ---- 3. 清理本地旧备份 (保留 7 天) ----
            echo "🧹 清理本地 7 天前的备份..."
            find "$BACKUP_DIR" -name "*.sql.gz" -mtime +7 -delete

            # ---- 4. 汇总 ----
            echo ""
            echo "📋 当前本地备份:"
            ls -lh "$BACKUP_DIR"/*.sql.gz 2>/dev/null | tail -10
            echo ""
            echo "🎉 备份完成！"
