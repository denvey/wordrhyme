# ============================================================
# WordRhyme CI/CD — Build Images on CI → Deploy to Server(s)
#
# 支持多服务器部署:
#   - 在 GitHub Settings → Environments 创建环境 (如 production-aliyun, production-dmit)
#   - 每个环境配置独立的 Secrets: SERVER_HOST, SERVER_USER, SSH_PRIVATE_KEY, SERVER_PORT
#   - push main 自动部署到所有环境 / 手动选择单个环境
#
# Required Secrets (每个 Environment):
#   SERVER_HOST       — 服务器 IP
#   SERVER_USER       — SSH 用户名
#   SSH_PRIVATE_KEY   — SSH 私钥
#   SERVER_PORT       — SSH 端口 (默认 22)
#
# GHCR 自动使用 GITHUB_TOKEN，无需额外配置
# ============================================================

name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.agent/**'
      - '.agents/**'
      - '.claude/**'
      - '.codex/**'
      - '.gemini/**'
      - '.magi/**'
      - '.trellis/**'
      - '.vscode/**'
      - 'example/**'

  workflow_dispatch:
    inputs:
      environment:
        description: '部署目标环境'
        type: choice
        options:
          - all
          - production-aliyun
          - production-dmit
        default: all
      run_migrate:
        description: '运行数据库迁移'
        type: boolean
        default: false
      skip_tests:
        description: '跳过测试（紧急修复时使用）'
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ============================================================
  # Job 1: 代码检查 & 类型检查
  # ============================================================
  check:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Lint
        run: pnpm check

      - name: Type check
        run: pnpm type-check
        continue-on-error: true

  # ============================================================
  # Job 2: 单元测试
  # ============================================================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    needs: check

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wordrhyme_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter='./packages/*'

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wordrhyme_test
          NODE_ENV: test

  # ============================================================
  # Job 3: 构建 Docker 镜像 & 推送到 GHCR
  # ============================================================
  build-images:
    name: 🏗️ Build & Push Images
    runs-on: ubuntu-latest
    needs: [check, test]
    if: |
      always() &&
      (needs.check.result == 'success' || needs.check.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [server, admin, web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.target }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  # ============================================================
  # Job 4: 部署到服务器 (支持多环境并行部署)
  # ============================================================
  deploy:
    name: 🚀 Deploy (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: build-images
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(
          (inputs.environment == '' || inputs.environment == 'all')
          && '["production-aliyun"]'
          || format('["{0}"]', inputs.environment)
          ) }}
        # ↑ push 触发时默认只部署 production-aliyun
        #   手动触发选 all → 部署全部；选某个 → 只部署那个
        #
        # 要加新服务器时:
        #   1. GitHub Settings → Environments → 新建 production-xxx
        #   2. 配置 Secrets: SERVER_HOST, SERVER_USER, SSH_PRIVATE_KEY
        #   3. 把上面的 '["production-aliyun"]' 改成
        #      '["production-aliyun","production-dmit"]'
    environment: ${{ matrix.environment }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            DEPLOY_DIR="/opt/wordrhyme"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            IMAGE_PREFIX="${{ env.IMAGE_PREFIX }}"
            SHA="${{ github.sha }}"
            SHORT_SHA="${SHA:0:7}"

            echo "🚀 [$TIMESTAMP] 部署 WordRhyme (commit: $SHORT_SHA)"
            echo "   环境: ${{ matrix.environment }}"
            echo "========================================"

            cd "$DEPLOY_DIR/infra"

            # 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 拉取最新镜像
            echo "📥 拉取镜像..."
            docker pull "${IMAGE_PREFIX}/server:latest"
            docker pull "${IMAGE_PREFIX}/admin:latest"
            docker pull "${IMAGE_PREFIX}/web:latest"

            # 同步部署配置文件
            echo "📋 同步配置文件..."
            cd "$DEPLOY_DIR"
            git fetch origin main
            git checkout origin/main -- \
              infra/docker-compose.prod.yml \
              infra/nginx/ \
              2>/dev/null || true
            cd infra

            # 启动服务
            MIGRATE="${{ inputs.run_migrate }}"
            if [ "$MIGRATE" = "true" ]; then
                echo "📦 本次部署将执行数据库迁移..."
                RUN_MIGRATE=true docker compose -f docker-compose.prod.yml --env-file .env.production up -d server
                echo "⏳ 等待迁移完成..."
                sleep 15
                docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            else
                echo "🚀 更新服务..."
                docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            fi

            # 清理旧镜像
            echo "🧹 清理旧镜像..."
            docker image prune -f

            # 健康检查
            echo "🏥 健康检查..."
            sleep 8
            FAILED=0
            for svc in wr-server wr-admin wr-web wr-nginx; do
                STATUS=$(docker inspect --format='{{.State.Status}}' "$svc" 2>/dev/null || echo "missing")
                if [ "$STATUS" = "running" ]; then
                    echo "   ✅ $svc"
                else
                    echo "   ❌ $svc: $STATUS"
                    FAILED=1
                fi
            done

            # 本机数据库容器 (外部数据库模式下可能不存在，不算失败)
            for svc in wr-postgres wr-redis; do
                STATUS=$(docker inspect --format='{{.State.Status}}' "$svc" 2>/dev/null || echo "not-used")
                if [ "$STATUS" = "running" ]; then
                    echo "   ✅ $svc"
                elif [ "$STATUS" = "not-used" ]; then
                    echo "   ⏭️  $svc (外部服务)"
                else
                    echo "   ❌ $svc: $STATUS"
                    FAILED=1
                fi
            done

            if [ "$FAILED" -eq 1 ]; then
                echo ""
                echo "⚠️  部分服务异常！最近日志："
                docker compose -f docker-compose.prod.yml logs --tail=30
                exit 1
            fi

            echo ""
            echo "🎉 部署完成！[$TIMESTAMP] commit=$SHORT_SHA env=${{ matrix.environment }}"
