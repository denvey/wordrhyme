# ============================================================
# WordRhyme CI/CD — Build Images on CI → Deploy to Server
#
# 流程:
#   1. Lint & Type Check
#   2. Unit Test (with Postgres service)
#   3. Build Docker images & push to GHCR (GitHub Container Registry)
#   4. SSH to server → pull images → docker compose up
#
# Required Secrets:
#   SERVER_HOST       — 服务器 IP 地址
#   SERVER_USER       — SSH 用户名
#   SSH_PRIVATE_KEY   — SSH 私钥
#   SERVER_PORT       — SSH 端口 (默认 22)
#
# GHCR 自动使用 GITHUB_TOKEN，无需额外配置
# ============================================================

name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.agent/**'
      - '.agents/**'
      - '.claude/**'
      - '.codex/**'
      - '.gemini/**'
      - '.magi/**'
      - '.trellis/**'
      - '.vscode/**'
      - 'example/**'

  workflow_dispatch:
    inputs:
      run_migrate:
        description: '运行数据库迁移'
        type: boolean
        default: false
      skip_tests:
        description: '跳过测试（紧急修复时使用）'
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ============================================================
  # Job 1: 代码检查 & 类型检查
  # ============================================================
  check:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Lint
        run: pnpm check

      - name: Type check
        run: pnpm type-check
        continue-on-error: true

  # ============================================================
  # Job 2: 单元测试
  # ============================================================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    needs: check

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wordrhyme_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter='./packages/*'

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wordrhyme_test
          NODE_ENV: test

  # ============================================================
  # Job 3: 构建 Docker 镜像 & 推送到 GHCR
  # ============================================================
  build-images:
    name: 🏗️ Build & Push Images
    runs-on: ubuntu-latest
    needs: [check, test]
    if: |
      always() &&
      (needs.check.result == 'success' || needs.check.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [server, admin, web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.target }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  # ============================================================
  # Job 4: 部署到服务器 (拉取预构建镜像)
  # ============================================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build-images
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            DEPLOY_DIR="/opt/wordrhyme"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            IMAGE_PREFIX="${{ env.IMAGE_PREFIX }}"
            SHA="${{ github.sha }}"
            SHORT_SHA="${SHA:0:7}"

            echo "🚀 [$TIMESTAMP] 部署 WordRhyme (commit: $SHORT_SHA)"
            echo "========================================"

            cd "$DEPLOY_DIR/infra"

            # 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 拉取最新镜像
            echo "📥 拉取镜像..."
            docker pull "${IMAGE_PREFIX}/server:latest"
            docker pull "${IMAGE_PREFIX}/admin:latest"
            docker pull "${IMAGE_PREFIX}/web:latest"

            # 同步部署配置文件（docker-compose 和 nginx 配置可能更新）
            echo "📋 同步配置文件..."
            cd "$DEPLOY_DIR"
            git fetch origin main
            git checkout origin/main -- \
              infra/docker-compose.prod.yml \
              infra/nginx/ \
              2>/dev/null || true
            cd infra

            # 启动服务（使用预构建镜像）
            # 如果需要迁移，通过 RUN_MIGRATE 环境变量让 server 启动时自动执行
            MIGRATE="${{ inputs.run_migrate }}"
            if [ "$MIGRATE" = "true" ]; then
                echo "📦 本次部署将执行数据库迁移..."
                # 先用 RUN_MIGRATE=true 启动一次 server，完成启动前迁移
                RUN_MIGRATE=true docker compose -f docker-compose.prod.yml --env-file .env.production up -d server
                echo "⏳ 等待迁移完成..."
                sleep 15
                # 迁移完成后，以常规配置启动全部服务，避免后续重启重复跑迁移
                docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            else
                echo "🚀 更新服务..."
                docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            fi

            # 清理旧镜像
            echo "🧹 清理旧镜像..."
            docker image prune -f

            # 健康检查
            echo "🏥 健康检查..."
            sleep 8
            FAILED=0
            for svc in wr-server wr-admin wr-web wr-nginx wr-postgres wr-redis; do
                STATUS=$(docker inspect --format='{{.State.Status}}' "$svc" 2>/dev/null || echo "missing")
                if [ "$STATUS" = "running" ]; then
                    echo "   ✅ $svc"
                else
                    echo "   ❌ $svc: $STATUS"
                    FAILED=1
                fi
            done

            if [ "$FAILED" -eq 1 ]; then
                echo ""
                echo "⚠️  部分服务异常！最近日志："
                docker compose -f docker-compose.prod.yml logs --tail=30
                exit 1
            fi

            echo ""
            echo "🎉 部署完成！[$TIMESTAMP] commit=$SHORT_SHA"
